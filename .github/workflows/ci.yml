name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Lint catalog (validate every template + digests + unique slugs)
        run: go run ./cmd/marketplace lint

      # On PRs, nudge contributors that the generated artifacts are stale. On main
      # we regenerate and commit them instead (see the publish job), so this is a
      # PR-only guard rather than a hard requirement to pre-commit generated files.
      - name: Generated artifacts are up to date
        if: github.event_name == 'pull_request'
        run: |
          go run ./cmd/marketplace generate
          git diff --exit-code export.json registry/index.json \
            || (echo "::error::export.json / registry/index.json are stale — run 'go run ./cmd/marketplace generate' and commit, or let the merge-to-main job regenerate them." && exit 1)

  # After merge to main, regenerate export.json + registry/index.json from the
  # templates and commit them back, so the repo always matches without
  # contributors having to run generate. (The catalog Miabi syncs is published as
  # a Release asset on tag — see the release job — not from main directly.)
  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: marketplace-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Generate catalog artifacts
        run: go run ./cmd/marketplace generate

      - name: Commit regenerated artifacts
        run: |
          if git diff --quiet -- export.json registry/index.json; then
            echo "No catalog changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add export.json registry/index.json
          git commit -m "chore(catalog): regenerate export.json + index [skip ci]"
          git push

  # Miabi syncs the catalog from the
  # latest release's export.json (a stable, immutable URL — see MIABI_MARKETPLACE_URL),
  # so cutting a tag is how a new catalog goes live.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Generate catalog bundle
        run: go run ./cmd/marketplace generate

      - name: Publish release with export.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(grep -o '"slug"' export.json | wc -l | tr -d ' ')
          notes="Marketplace catalog bundle for ${GITHUB_REF_NAME} (${count} templates)."
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" export.json registry/index.json --clobber
          else
            gh release create "${GITHUB_REF_NAME}" export.json registry/index.json \
              --title "Catalog ${GITHUB_REF_NAME}" --notes "${notes}"
          fi
